<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGadda — Epistolario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814; --paper: #f5f0e8; --accent: #5a1e7a; --accent-light: #9a5abf;
  --muted: #7a7268; --border: #c8bfaa; --white: #fdfaf5; --tag-bg: #ecdff0; --tag-text: #5a1e7a;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'EB Garamond',Georgia,serif; background:var(--paper); color:var(--ink); }
nav { background:var(--ink); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 2.5rem; gap:2rem; height:52px; position:sticky; top:0; z-index:100; }
.nav-brand { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.18em; color:var(--white); text-decoration:none; margin-right:auto; }
nav a { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#9a9080; text-decoration:none; transition:color 0.2s; }
nav a:hover, nav a.active { color:#e8c89a; }

header { background:var(--ink); color:var(--white); padding:2.5rem 2.5rem 2rem; border-bottom:3px solid var(--accent); }
header .eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#5a5248; margin-bottom:0.5rem; }
header h1 { font-size:2.4rem; font-weight:400; font-style:italic; margin-bottom:0.4rem; }
header p { color:#9a9080; font-size:1rem; }

.layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 140px); }
.sidebar { background:var(--white); border-right:1px solid var(--border); padding:1.5rem 1.25rem; position:sticky; top:52px; height:calc(100vh - 52px); overflow-y:auto; }
.sidebar-section { margin-bottom:1.75rem; }
.sidebar-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; display:block; }
.sidebar input[type=text] { width:100%; padding:0.5rem 0.6rem; font-family:'EB Garamond',serif; font-size:1rem; border:1px solid var(--border); background:var(--paper); color:var(--ink); border-radius:2px; outline:none; }
.sidebar input[type=text]:focus { border-color:var(--accent); }
.range-wrap { display:flex; gap:6px; align-items:center; font-size:0.85rem; color:var(--muted); }
.range-wrap input[type=number] { width:68px; padding:0.3rem 0.4rem; font-family:'DM Mono',monospace; font-size:12px; border:1px solid var(--border); background:var(--paper); color:var(--ink); border-radius:2px; outline:none; }
.filter-group { display:flex; flex-direction:column; gap:3px; }
.filter-btn { text-align:left; background:none; border:none; padding:0.3rem 0.5rem; font-family:'EB Garamond',serif; font-size:0.9rem; color:var(--muted); cursor:pointer; border-radius:2px; display:flex; justify-content:space-between; align-items:center; transition:background 0.15s,color 0.15s; }
.filter-btn:hover { background:var(--tag-bg); color:var(--ink); }
.filter-btn.active { background:var(--accent); color:var(--white); }
.filter-btn .count { font-family:'DM Mono',monospace; font-size:10px; opacity:0.7; }

.main { padding:1.5rem 2rem; }
.stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:3px; margin-bottom:1.25rem; overflow:hidden; }
.stat { background:var(--white); padding:0.75rem 1rem; text-align:center; }
.stat-n { font-family:'DM Mono',monospace; font-size:1.3rem; font-weight:500; color:var(--accent); display:block; }
.stat-l { font-size:0.8rem; color:var(--muted); }

/* Tab bar */
.tab-bar { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:1.25rem; }
.tab-btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-2px; padding:0.55rem 1.1rem; cursor:pointer; color:var(--muted); transition:color 0.15s,border-color 0.15s; }
.tab-btn:hover { color:var(--ink); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }

/* Sender cards grid */
.sender-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
.sender-card {
  background:var(--white); border:1px solid var(--border); border-radius:4px;
  padding:1rem 1.1rem; cursor:pointer; transition:border-color 0.15s, box-shadow 0.15s;
  display:flex; flex-direction:column; gap:6px;
}
.sender-card:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(90,30,122,0.08); }
.sender-card.no-letters { opacity:0.5; cursor:default; }
.sender-card.no-letters:hover { border-color:var(--border); box-shadow:none; }
.sender-name { font-size:1rem; font-weight:500; line-height:1.3; color:var(--ink); }
.sender-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:2px; }
.sender-tipo { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; background:var(--tag-bg); color:var(--tag-text); padding:1px 6px; border-radius:2px; }
.sender-range { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
.sender-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent); margin-left:auto; }
.sender-archives { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); }
.sender-titolo { font-family:'EB Garamond',serif; font-size:0.85rem; font-style:italic; color:var(--muted); line-height:1.3; margin-top:2px; }
.sender-sigla { font-family:'DM Mono',monospace; font-size:9px; font-style:normal; background:var(--tag-bg); color:var(--tag-text); padding:1px 5px; border-radius:2px; vertical-align:middle; margin-right:3px; }

/* Letter list (drill-down) */
.back-btn { display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid var(--border); border-radius:2px; padding:5px 12px; cursor:pointer; margin-bottom:1.25rem; transition:color 0.15s,border-color 0.15s; }
.back-btn:hover { color:var(--accent); border-color:var(--accent); }
.sender-header { margin-bottom:1.25rem; }
.sender-header h2 { font-size:1.6rem; font-weight:400; font-style:italic; }
.sender-header .sh-meta { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:4px; }

.entry { border-bottom:1px solid var(--border); padding:0.9rem 0.25rem; display:grid; grid-template-columns:64px 1fr auto; gap:0.75rem; align-items:start; transition:background 0.15s; cursor:pointer; }
.entry:hover { background:var(--white); padding-left:0.5rem; padding-right:0.5rem; margin:0 -0.25rem; }
.entry-year { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); padding-top:3px; text-align:right; }
.entry-title { font-size:1rem; font-weight:500; line-height:1.3; color:var(--ink); margin-bottom:3px; }
.entry-title .arrow { color:var(--accent); margin:0 5px; }
.entry-source { font-family:'DM Mono',monospace; font-size:10px; color:#9a9080; letter-spacing:0.04em; }
.type-tag { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; background:var(--tag-bg); color:var(--tag-text); padding:2px 6px; border-radius:2px; white-space:nowrap; flex-shrink:0; align-self:start; margin-top:3px; }
.corpus-tag { font-family:'DM Mono',monospace; font-size:9px; padding:2px 7px; border-radius:2px; white-space:nowrap; background:#5a1e7a18; color:#5a1e7a; border:1px solid #5a1e7a40; cursor:pointer; display:inline-block; }
.corpus-tag:hover { background:#5a1e7a28; }

.no-results { text-align:center; padding:4rem 1rem; color:var(--muted); font-style:italic; font-size:1.1rem; }
.pagination { display:flex; gap:6px; justify-content:center; margin-top:2rem; flex-wrap:wrap; }
.page-btn { font-family:'DM Mono',monospace; font-size:11px; border:1px solid var(--border); background:none; color:var(--muted); padding:4px 12px; cursor:pointer; border-radius:2px; }
.page-btn.active { background:var(--ink); color:var(--white); border-color:var(--ink); }
.page-btn:hover:not(.active) { background:var(--tag-bg); }

.conn-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.conn-badge { font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; border-radius:2px; font-weight:600; letter-spacing:0.05em; white-space:nowrap; cursor:pointer; }
.filter-banner { display:none; background:#dff0e8; border:1px solid #c8bfaa; border-radius:3px; padding:0.55rem 1rem; margin-bottom:1rem; align-items:center; justify-content:space-between; font-family:'DM Mono',monospace; font-size:11px; }
.filter-banner.active { display:flex; }
.filter-banner button { background:none; border:none; cursor:pointer; color:#7a7268; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; }
.expand-search-btn { color:var(--accent) !important; border:1px solid var(--accent); border-radius:2px; padding:1px 8px; margin-right:8px; }

@media(max-width:700px) { .layout { grid-template-columns:1fr; } .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); } .sender-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">OpenGadda</a>
  <a href="archive.html">Archivio</a>
  <a href="primary_bibliography.html">Bib. primaria</a>
  <a href="secondary_bibliography.html">Bib. secondaria</a>
  <a href="library.html">Biblioteca</a>
  <a href="epistolario.html" class="active">Epistolario</a>
  <a href="translations.html">Traduzioni</a>
</nav>

<header>
  <div class="eyebrow">OpenGadda</div>
  <h1>Epistolario</h1>
  <p id="header-sub">Caricamento…</p>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">

    <!-- Senders sidebar -->
    <div id="sb-senders">
      <div class="sidebar-section">
        <span class="sidebar-label">Ricerca</span>
        <input type="text" id="search-senders" placeholder="Nome mittente…" oninput="renderSenders()" id="search-senders">
      </div>
      <div class="sidebar-section">
        <span class="sidebar-label">Tipologia</span>
        <div class="filter-group" id="tipo-btns"></div>
      </div>
      <div class="sidebar-section">
        <span class="sidebar-label">Ordinamento</span>
        <div class="filter-group">
          <button class="filter-btn active" id="ss-alpha" onclick="setSenderSort('alpha')">Alfabetico</button>
          <button class="filter-btn" id="ss-count" onclick="setSenderSort('count')">Per n. lettere</button>
        </div>
      </div>
    </div>

    <!-- Letters sidebar -->
    <div id="sb-letters" style="display:none">
      <div class="sidebar-section">
        <span class="sidebar-label">Ricerca</span>
        <input type="text" id="search-letters" placeholder="Titolo, luogo…" oninput="applyLetterFilters()">
      </div>
      <div class="sidebar-section">
        <span class="sidebar-label">Anno</span>
        <div class="range-wrap">
          <input type="number" id="yearFrom" placeholder="dal" oninput="applyLetterFilters()">
          <span>—</span>
          <input type="number" id="yearTo" placeholder="al" oninput="applyLetterFilters()">
        </div>
      </div>
      <div class="sidebar-section">
        <span class="sidebar-label">Ordinamento</span>
        <div class="filter-group">
          <button class="filter-btn active" id="s-date" onclick="setLetterSort('date')">Cronologico</button>
          <button class="filter-btn" id="s-sender" onclick="setLetterSort('sender')">Mittente</button>
        </div>
      </div>
    </div>

  </aside>

  <main class="main">

    <!-- Senders view -->
    <div id="view-senders">
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-riceve" onclick="switchTab('riceve')">Gadda riceve</button>
        <button class="tab-btn" id="tab-scrive" onclick="switchTab('scrive')">Gadda scrive</button>
      </div>
      <div class="stats-bar">
        <div class="stat"><span class="stat-n" id="sn-total-s">0</span><span class="stat-l" id="sl-total-s">mittenti</span></div>
        <div class="stat"><span class="stat-n" id="sn-shown-s">0</span><span class="stat-l">visualizzati</span></div>
        <div class="stat"><span class="stat-n" id="sn-letters-s">0</span><span class="stat-l" id="sl-letters-s">lettere censite</span></div>
      </div>
      <div class="sender-grid" id="sender-grid"></div>
    </div>

    <!-- Letters view -->
    <div id="view-letters" style="display:none">
      <button class="back-btn" id="back-btn" onclick="showSendersView()">← Tutti i mittenti</button>
      <div class="sender-header" id="sender-header"></div>
      <div class="stats-bar">
        <div class="stat"><span class="stat-n" id="sn-total-l">0</span><span class="stat-l">lettere totali</span></div>
        <div class="stat"><span class="stat-n" id="sn-shown-l">0</span><span class="stat-l">risultati</span></div>
        <div class="stat"><span class="stat-n" id="sn-corr-l">0</span><span class="stat-l" id="sl-corr-l">destinatari</span></div>
      </div>
      <div id="filter-banner" class="filter-banner">
        <span id="filter-banner-text"></span>
        <button class="expand-search-btn" onclick="expandToDataset()">Cerca nel dataset →</button>
        <button onclick="clearCrossFilter()">× Torna a questa sezione</button>
      </div>
      <div id="entries"></div>
      <div id="pagination" class="pagination"></div>
    </div>

  </main>
</div>

<script>
const PER_PAGE = 50;
let MITTENTI = [];
let DESTINATARI = [];
let ALL_DATA = [];
let CONN_SUMMARY = {};
let activeTipo = null;
let senderSort = 'alpha';
let currentSender = null;
let currentTab = 'riceve'; // 'riceve' | 'scrive'

let letterFiltered = [];
let letterPage = 1;
let letterSort = 'date';
let letterDir = 1;
let themeFilter = null;
let personFilter = null;
let currentFilterTerm = '';

// ── Tab switching ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  activeTipo = null;
  document.getElementById('tab-riceve').classList.toggle('active', tab === 'riceve');
  document.getElementById('tab-scrive').classList.toggle('active', tab === 'scrive');
  document.getElementById('search-senders').placeholder = tab === 'riceve' ? 'Nome mittente…' : 'Nome destinatario…';
  document.getElementById('sl-total-s').textContent = tab === 'riceve' ? 'mittenti' : 'destinatari';
  document.getElementById('sl-letters-s').textContent = tab === 'riceve' ? 'lettere censite' : 'lettere di Gadda';
  buildTipoBtns();
  renderSenders();
}

// ── Senders/Destinatari view ──────────────────────────────────────────────────

function activePool() {
  return currentTab === 'riceve' ? MITTENTI : DESTINATARI;
}

function buildTipoBtns() {
  const container = document.getElementById('tipo-btns');
  container.innerHTML = '';
  const pool = activePool();
  const tipos = [...new Set(pool.map(m => m.tipologia).filter(Boolean))].sort();
  if (!tipos.length) { container.closest('.sidebar-section').style.display = 'none'; return; }
  container.closest('.sidebar-section').style.display = '';
  tipos.forEach(t => {
    const cnt = pool.filter(m => m.tipologia === t).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeTipo === t ? ' active' : '');
    btn.innerHTML = `${t} <span class="count">${cnt}</span>`;
    btn.onclick = () => {
      activeTipo = activeTipo === t ? null : t;
      container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (activeTipo) btn.classList.add('active');
      renderSenders();
    };
    container.appendChild(btn);
  });
}

function setSenderSort(key) {
  senderSort = key;
  document.getElementById('ss-alpha').classList.toggle('active', key === 'alpha');
  document.getElementById('ss-count').classList.toggle('active', key === 'count');
  renderSenders();
}

function renderSenders() {
  const q = document.getElementById('search-senders').value.toLowerCase();
  const pool = activePool();
  let shown = pool.filter(m => {
    if (activeTipo && m.tipologia !== activeTipo) return false;
    if (q && !m.name.toLowerCase().includes(q)) return false;
    return true;
  });
  if (senderSort === 'alpha') shown.sort((a,b) => a.name.localeCompare(b.name, 'it'));
  else shown.sort((a,b) => b.count - a.count);

  const allLetters = ALL_DATA.filter(d => d.category === 'letter');
  const tabLetters = currentTab === 'riceve' ? allLetters : allLetters.filter(d =>
    (d.people||[]).some(p => p.name === 'Gadda Carlo Emilio' && p.role === 'mittente')
  );

  document.getElementById('sn-total-s').textContent = pool.length;
  document.getElementById('sn-shown-s').textContent = shown.length;
  document.getElementById('sn-letters-s').textContent = tabLetters.length.toLocaleString('it');

  const TIPO_ABBR = {
    'Familiari': 'Fam.',
    'Amici': 'Amici',
    'Contatti letterari': 'Lett.',
    'Editori, riviste e quotidiani': 'Ed.',
    'Istituzioni, associazioni ed enti pubblici': 'Ist.',
    'Ingegneria e divulgazione tecnica': 'Ing.',
    'Compagni di guerra e di prigionia': 'Guerra',
    'Varia': 'Varia',
  };

  const grid = document.getElementById('sender-grid');
  grid.onclick = e => {
    const card = e.target.closest('.sender-card');
    if (card && card.dataset.clickable === 'true') showLettersView(card.dataset.senderName);
  };
  grid.innerHTML = shown.map(m => {
    const clickable = m.has_letters;
    let bottomLine = '';
    if (currentTab === 'riceve') {
      const archParts = [];
      if (m.bonsanti) archParts.push(`Bonsanti: ${m.bonsanti}`);
      if (m.liberati) archParts.push(`Liberati: ${m.liberati}`);
      if (archParts.length) bottomLine = `<div class="sender-archives">${archParts.join(' · ')}</div>`;
    } else {
      // no extra info for computed destinatari
    }
    return `<div class="sender-card${clickable ? '' : ' no-letters'}" data-sender-name="${m.name.replace(/"/g,'&quot;')}" data-clickable="${clickable}">
      <div class="sender-name">${m.name}</div>
      <div class="sender-meta">
        ${m.tipologia ? `<span class="sender-tipo">${TIPO_ABBR[m.tipologia] || m.tipologia}</span>` : ''}
        ${m.date_range ? `<span class="sender-range">${m.date_range}</span>` : ''}
        <span class="sender-count">${m.count} lett.</span>
      </div>
      ${bottomLine}
    </div>`;
  }).join('');
}

// ── Letters view ─────────────────────────────────────────────────────────────

function parseLetter(d) {
  const parts = d.title.includes('→') ? d.title.split('→') : [d.title, ''];
  return { sender: parts[0].trim(), recipient: parts[1].trim() };
}

function showSendersView() {
  currentSender = null;
  document.getElementById('view-senders').style.display = '';
  document.getElementById('view-letters').style.display = 'none';
  document.getElementById('sb-senders').style.display = '';
  document.getElementById('sb-letters').style.display = 'none';
  history.replaceState(null, '', 'epistolario.html');
}

function showLettersView(personName) {
  currentSender = personName;
  const pool = activePool();
  const entry = pool.find(m => m.name === personName);
  themeFilter = null; personFilter = null;
  document.getElementById('filter-banner').classList.remove('active');

  document.getElementById('view-senders').style.display = 'none';
  document.getElementById('view-letters').style.display = '';
  document.getElementById('sb-senders').style.display = 'none';
  document.getElementById('sb-letters').style.display = '';

  const backLabel = currentTab === 'riceve' ? '← Tutti i mittenti' : '← Tutti i destinatari';
  document.getElementById('back-btn').textContent = backLabel;

  document.getElementById('sl-corr-l').textContent = currentTab === 'riceve' ? 'destinatari' : 'mittenti';

  document.getElementById('sender-header').innerHTML = `
    <h2>${personName}</h2>
    <div class="sh-meta">${entry ? (entry.tipologia + (entry.date_range ? ' · ' + entry.date_range : '')) : ''}</div>
  `;

  applyLetterFilters();
}

function applyLetterFilters() {
  if (themeFilter) {
    letterFiltered = ALL_DATA.filter(d => (d.themes||[]).includes(themeFilter));
    doLetterSort(); letterPage = 1; renderLetters(); return;
  }
  if (personFilter) {
    letterFiltered = ALL_DATA.filter(d => (d.people||[]).some(p => p.name === personFilter));
    doLetterSort(); letterPage = 1; renderLetters(); return;
  }
  const q = (document.getElementById('search-letters').value || '').toLowerCase();
  const yf = parseInt(document.getElementById('yearFrom').value) || 0;
  const yt = parseInt(document.getElementById('yearTo').value) || 9999;
  const letters = ALL_DATA.filter(d => d.category === 'letter');
  letterFiltered = letters.filter(d => {
    const {sender, recipient} = parseLetter(d);
    if (currentSender) {
      if (currentTab === 'riceve') {
        if (!(d.people||[]).some(p => p.name === currentSender && p.role === 'mittente')) return false;
      } else {
        if (!(d.people||[]).some(p => p.name === currentSender && p.role === 'destinatario')) return false;
        if (!(d.people||[]).some(p => p.name === 'Gadda Carlo Emilio' && p.role === 'mittente')) return false;
      }
    }
    if (q && !(sender.toLowerCase().includes(q) || recipient.toLowerCase().includes(q) || (d.detail||'').toLowerCase().includes(q))) return false;
    if (d.year < yf || d.year > yt) return false;
    return true;
  });
  doLetterSort(); letterPage = 1; renderLetters();
}

function doLetterSort() {
  letterFiltered.sort((a,b) => {
    if (letterSort === 'date') return letterDir * (new Date(a.date) - new Date(b.date));
    return letterDir * parseLetter(a).sender.localeCompare(parseLetter(b).sender);
  });
}

function setLetterSort(key) {
  if (letterSort === key) letterDir *= -1; else { letterSort = key; letterDir = 1; }
  ['date','sender'].forEach(k => document.getElementById('s-'+k).classList.toggle('active', k === key));
  doLetterSort(); renderLetters();
}

function renderLetters() {
  const letters = ALL_DATA.filter(d => d.category === 'letter');
  document.getElementById('sn-total-l').textContent = letters.filter(d => {
    if (!currentSender) return true;
    return (d.people||[]).some(p => p.name === currentSender);
  }).length.toLocaleString('it');
  document.getElementById('sn-shown-l').textContent = letterFiltered.length.toLocaleString('it');
  const otherRole = currentTab === 'riceve' ? 'destinatario' : 'mittente';
  const corrSet = new Set(letterFiltered.flatMap(d => (d.people||[]).filter(p => p.role === otherRole).map(p => p.name)));
  document.getElementById('sn-corr-l').textContent = corrSet.size;

  const start = (letterPage - 1) * PER_PAGE;
  const page = letterFiltered.slice(start, start + PER_PAGE);
  if (!page.length) {
    document.getElementById('entries').innerHTML = '<div class="no-results">Nessuna lettera trovata.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('entries').innerHTML = page.map(d => {
    const {sender, recipient} = parseLetter(d);
    const dateFmt = d.date ? new Date(d.date).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}) : d.year;
    const sourceParts = [dateFmt, d.luogo_di_invio || d.detail || ''].filter(Boolean);
    const typeTag = d.subtitle ? `<span class="type-tag">${d.subtitle}</span>` : '';
    const sigla = (d.themes||[])[0];
    const pubName = sigla ? (SIGLA_TO_NAME[sigla] || sigla) : '';
    const pubTag = pubName ? `<div style="margin-top:3px"><span class="corpus-tag" onclick="event.stopPropagation();setThemeFilter(${JSON.stringify(sigla)})">✉ ${pubName}</span></div>` : '';
    return `<div class="entry" onclick="window.location.href='detail.html?id=${d.id}'">
      <div class="entry-year">${d.year}</div>
      <div>
        <div class="entry-title"><em>${sender}</em><span class="arrow">→</span><em>${recipient}</em></div>
        <div class="entry-source">${sourceParts.join(' · ')}</div>
        ${pubTag}
        ${connBadges(d.id, 'letter')}
      </div>
      ${typeTag}
    </div>`;
  }).join('');

  const totalPages = Math.ceil(letterFiltered.length / PER_PAGE);
  let pages = '';
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - letterPage) <= 3)
      pages += `<button class="page-btn ${i === letterPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i - letterPage) === 4)
      pages += `<span style="padding:4px;color:#999;font-size:11px">…</span>`;
  }
  document.getElementById('pagination').innerHTML = pages;
}

function goPage(n) { letterPage = n; renderLetters(); window.scrollTo(0,0); }

// ── Cross-filter (from detail.html) ──────────────────────────────────────────

function setThemeFilter(t) {
  themeFilter = t; currentFilterTerm = t; personFilter = null;
  showLettersView_cross();
  document.getElementById('filter-banner-text').textContent = 'Scheda tematica: ' + t;
  document.getElementById('filter-banner').classList.add('active');
  applyLetterFilters();
}

function setPersonFilter(name) {
  personFilter = name; currentFilterTerm = name; themeFilter = null;
  showLettersView_cross();
  document.getElementById('filter-banner-text').textContent = 'Persona: ' + name;
  document.getElementById('filter-banner').classList.add('active');
  applyLetterFilters();
}

function showLettersView_cross() {
  currentSender = null;
  document.getElementById('view-senders').style.display = 'none';
  document.getElementById('view-letters').style.display = '';
  document.getElementById('sb-senders').style.display = 'none';
  document.getElementById('sb-letters').style.display = '';
  document.getElementById('sender-header').innerHTML = '';
}

function clearCrossFilter() {
  themeFilter = null; personFilter = null;
  document.getElementById('filter-banner').classList.remove('active');
  showSendersView();
}

function expandToDataset() {
  if (currentFilterTerm) window.location.href = 'search.html?q=' + encodeURIComponent(currentFilterTerm);
}

// ── Connection badges ─────────────────────────────────────────────────────────

const BADGE_COLORS = {"library":"#7a3b1e","secondary bibliography":"#1e4a7a","primary bibliography":"#1a6a40","archive":"#6a3a1a","letter":"#5a1e7a","translation":"#6a5a1a"};
const BADGE_SHORT = {"library":"Bib.","secondary bibliography":"Bib. sec.","primary bibliography":"Bib. prim.","archive":"Arc.","letter":"Ep.","translation":"Trad."};
function connBadges(id, ownCat) {
  const cats = CONN_SUMMARY[id];
  if (!cats || !cats.length) return '';
  const f = cats.filter(c => c !== ownCat);
  if (!f.length) return '';
  return '<div class="conn-badges">' + f.map(c => {
    const col = BADGE_COLORS[c] || '#888';
    return `<span class="conn-badge" style="background:${col}18;color:${col};border:1px solid ${col}40" onclick="event.stopPropagation();window.location='detail.html?id=${id}'">${BADGE_SHORT[c]||c}</span>`;
  }).join('') + '</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────

let SIGLA_TO_NAME = {};

Promise.all([
  fetch('items.json').then(r => r.json()),
  fetch('mittenti.json').then(r => r.json()),
  fetch('conn_summary.json').then(r => r.json()),
  fetch('destinatari.json').then(r => r.json()).catch(() => []),
]).then(([allData, mittenti, summary, destinatari]) => {
  destinatari.forEach(d => { if (d.sigla && d.titolo && !SIGLA_TO_NAME[d.sigla]) SIGLA_TO_NAME[d.sigla] = d.titolo; });
  ALL_DATA = allData;
  CONN_SUMMARY = summary;

  // Compute has_letters for mittenti: only those who sent to Gadda
  const senderPeople = new Set(
    allData.filter(d => d.category === 'letter')
           .flatMap(d => (d.people||[]).filter(p => p.role === 'mittente').map(p => p.name))
  );
  MITTENTI = mittenti.map(m => ({...m, has_letters: senderPeople.has(m.name)}));

  // Compute DESTINATARI from letters where Gadda is the sender
  const destMap = {};
  allData.filter(d =>
    d.category === 'letter' &&
    (d.people||[]).some(p => p.name === 'Gadda Carlo Emilio' && p.role === 'mittente')
  ).forEach(d => {
    (d.people||[]).filter(p => p.role === 'destinatario').forEach(p => {
      if (!destMap[p.name]) destMap[p.name] = { name: p.name, count: 0, years: [], tipologia: '', bonsanti: 0, liberati: 0 };
      destMap[p.name].count++;
      if (d.year) destMap[p.name].years.push(d.year);
    });
  });
  DESTINATARI = Object.values(destMap).map(d => {
    const yrs = d.years;
    const range = yrs.length ? (Math.min(...yrs) === Math.max(...yrs) ? String(Math.min(...yrs)) : `${Math.min(...yrs)}–${Math.max(...yrs)}`) : '';
    return { ...d, date_range: range, has_letters: true };
  });

  const totalLetters = allData.filter(d => d.category === 'letter').length;
  document.getElementById('header-sub').textContent = `${MITTENTI.length.toLocaleString('it')} mittenti · ${totalLetters.toLocaleString('it')} lettere censite`;

  buildTipoBtns();
  renderSenders();

  const urlP = new URLSearchParams(window.location.search);
  if (urlP.get('theme')) setThemeFilter(decodeURIComponent(urlP.get('theme')));
  else if (urlP.get('person')) setPersonFilter(decodeURIComponent(urlP.get('person')));
  else if (urlP.get('sender')) showLettersView(decodeURIComponent(urlP.get('sender')));
}).catch(err => {
  document.getElementById('sender-grid').innerHTML = `<p style="padding:2rem;color:#c00;font-family:monospace">Errore: ${err}</p>`;
});
</script>
