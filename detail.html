<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGadda — Scheda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --paper: #f5f0e8;
  --accent: #7a3b1e;
  --accent-blue: #1e4a7a;
  --accent-light: #c8794a;
  --muted: #7a7268;
  --border: #c8bfaa;
  --white: #fdfaf5;
  --tag-bg: #e8dfd0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'EB Garamond', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
nav { background:var(--ink); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 2.5rem; gap:2rem; height:52px; position:sticky; top:0; z-index:100; }
.nav-brand { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.18em; color:var(--white); text-decoration:none; margin-right:auto; }
nav a { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#9a9080; text-decoration:none; transition:color 0.2s; }
nav a:hover { color:#e8c89a; }

.back-bar {
  padding: 0.75rem 2.5rem; border-bottom: 1px solid var(--border);
  background: var(--white);
}
.back-btn {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); text-decoration: none; letter-spacing: 0.1em;
  text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { color: var(--accent); }

.page-wrap {
  max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem;
  display: grid; grid-template-columns: 1fr 280px; gap: 2rem;
  align-items: start;
}
.page-wrap > div:last-child {
  position: sticky;
  top: 1.5rem;
  max-height: calc(100vh - 3rem);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.main-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 4px; padding: 2rem;
}
.cat-tag {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px; display: inline-block;
  margin-bottom: 1rem;
}
.cat-library { background: #e8dfd0; color: #7a3b1e; }
.cat-secondary { background: #dce6f0; color: #1e4a7a; }
.cat-primary { background: #dff0e8; color: #1a6a40; }
.cat-archive { background: #f0e8dc; color: #6a4a1a; }
.cat-letter { background: #ecdff0; color: #5a1e7a; }
.cat-translation { background: #f0ecdc; color: #6a5a1a; }

.record-title {
  font-size: 1.9rem; font-weight: 400; line-height: 1.25;
  margin-bottom: 0.5rem; font-style: italic;
}
.record-author {
  font-size: 1.1rem; color: var(--muted); margin-bottom: 1.5rem;
}
.divider {
  border: none; border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}
.meta-table { width: 100%; border-collapse: collapse; }
.meta-table tr td:first-child {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); width: 130px; padding: 0.45rem 0;
  vertical-align: top;
}
.meta-table tr td:last-child {
  font-size: 1rem; padding: 0.45rem 0; color: var(--ink);
}
.meta-table tr + tr td {
  border-top: 1px solid var(--border);
}

.sidebar-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 4px; padding: 1.25rem; margin-bottom: 1rem;
}
.sidebar-card h3 {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 0.85rem;
}
.related-item {
  border-bottom: 1px solid var(--border); padding: 0.6rem 0;
  cursor: pointer; transition: background 0.12s;
}
.related-item:last-child { border-bottom: none; }
.related-item:hover { color: var(--accent); }
.related-title { font-size: 0.9rem; font-weight: 500; line-height: 1.3; }
.related-author { font-size: 0.82rem; font-style: italic; color: var(--muted); }
.related-year { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }
.id-display {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); background: var(--paper);
  padding: 0.4rem 0.6rem; border-radius: 2px;
  border: 1px solid var(--border); display: inline-block; margin-top: 0.5rem;
}

.not-found {
  max-width: 500px; margin: 5rem auto; text-align: center;
  padding: 2rem; color: var(--muted);
}
.not-found h2 { font-size: 1.4rem; font-style: italic; margin-bottom: 0.5rem; }

@media (max-width: 720px) {
  .page-wrap { grid-template-columns: 1fr; }
  .page-wrap > .sidebar-card { order: -1; }
}

.conn-panel { margin-top: 1.25rem; }
.conn-section { margin-bottom: 1rem; }
.conn-section-title {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.5rem; display: flex;
  align-items: center; gap: 8px;
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-item {
  display: block; border-bottom: 1px solid var(--border);
  padding: 0.5rem 0; text-decoration: none; color: var(--ink);
  transition: padding-left 0.12s; cursor: pointer;
}
.conn-item:hover { padding-left: 6px; }
.conn-item:last-child { border-bottom: none; }
.conn-item-title { font-size: 0.88rem; font-weight: 500; line-height: 1.3; margin-bottom: 2px; }
.conn-item-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.conn-item-year { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }
.conn-empty { font-size: 0.85rem; color: var(--muted); font-style: italic; padding: 0.5rem 0; }
.conn-panel .sidebar-card { border: 1px solid var(--border); border-radius: var(--border-radius-lg, 12px); background: var(--white); padding: 1.25rem; }
.conn-panel h3 { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.85rem; }
.browse-link {
  display: inline-block; margin-top: 0.75rem;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--accent); text-decoration: none;
  border-bottom: 1px solid var(--accent); padding-bottom: 1px;
}

.conn-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.conn-badge { font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; border-radius:2px; font-weight:600; letter-spacing:0.05em; white-space:nowrap; cursor:pointer; }
.conn-card { margin-top:1.25rem; }
.conn-card h3 { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:0.85rem; }
.conn-section { margin-bottom:1rem; }
.conn-section-title { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:0.4rem; display:flex; align-items:center; gap:7px; }
.conn-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.conn-item { display:block; border-bottom:1px solid var(--border); padding:0.45rem 0; text-decoration:none; color:var(--ink); transition:padding-left 0.1s; cursor:pointer; }
.conn-item:hover { padding-left:5px; }
.conn-item:last-of-type { border-bottom:none; }
.conn-item-year { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:1px; }
.conn-item-title { font-size:0.87rem; font-weight:500; line-height:1.3; }
.conn-item-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
.conn-empty { font-size:0.85rem; color:var(--muted); font-style:italic; }
.conn-more { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); text-decoration:none; display:block; margin-top:0.4rem; }

.show-more-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); background: none; border: none;
  padding: 0.5rem 0; cursor: pointer; display: block; width: 100%;
  text-align: left; margin-top: 0.25rem;
}
.show-more-btn:hover { text-decoration: underline; }

/* Citation modal */
.cite-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); background: none;
  border: 1px solid var(--border); border-radius: 2px; padding: 4px 10px;
  cursor: pointer; transition: color 0.15s, border-color 0.15s; margin-top: 1.25rem;
  display: inline-block;
}
.cite-btn:hover { color: var(--accent); border-color: var(--accent); }
.cite-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(20,18,14,0.6);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.18s;
}
.cite-overlay.open { opacity: 1; pointer-events: all; }
.cite-box {
  background: var(--white); border: 1px solid var(--border); border-radius: 6px;
  width: min(680px, 92vw); max-height: 90vh; overflow-y: auto; padding: 2rem;
}
.cite-box h2 { font-size: 1.1rem; font-style: italic; font-weight: 400; margin-bottom: 1.25rem; }
.cite-tabs { display: flex; gap: 2px; margin-bottom: 1rem; }
.cite-tab {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; background: var(--paper); border: 1px solid var(--border);
  padding: 4px 12px; cursor: pointer; border-radius: 2px; color: var(--muted);
}
.cite-tab.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.cite-output {
  font-family: 'EB Garamond', Georgia, serif; font-size: 1rem; line-height: 1.6;
  background: var(--paper); border: 1px solid var(--border); border-radius: 3px;
  padding: 1rem 1.25rem; white-space: pre-wrap; word-break: break-word; min-height: 80px;
}
.cite-actions { display: flex; gap: 8px; margin-top: 0.75rem; justify-content: flex-end; }
.cite-copy-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; background: var(--accent); color: var(--white);
  border: none; border-radius: 2px; padding: 5px 14px; cursor: pointer;
}
.cite-close-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; background: none; color: var(--muted);
  border: 1px solid var(--border); border-radius: 2px; padding: 5px 14px; cursor: pointer;
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">OpenGadda</a>
  <a href="archive.html">Archivio</a>
  <a href="primary_bibliography.html">Bib. primaria</a>
  <a href="secondary_bibliography.html">Bib. secondaria</a>
  <a href="library.html">Biblioteca</a>
  <a href="epistolario.html">Epistolario</a>
  <a href="translations.html">Traduzioni</a>
</nav>

<div class="back-bar">
  <a class="back-btn" id="back-link" href="library.html">← Torna al catalogo</a>
</div>

<div id="content"></div>

<script>
const BADGE_COLORS = {"library": "#7a3b1e", "secondary bibliography": "#1e4a7a", "primary bibliography": "#1a6a40", "archive": "#6a3a1a", "letter": "#5a1e7a", "translation": "#6a5a1a"};
const BADGE_SHORT = {"library": "Bib.", "secondary bibliography": "Bib. sec.", "primary bibliography": "Bib. prim.", "archive": "Arc.", "letter": "Ep.", "translation": "Trad."};
function connBadges(id, ownCat) {
  const cats = CONN_SUMMARY[id];
  if (!cats || !cats.length) return '';
  const filtered = cats.filter(c => c !== ownCat);
  if (!filtered.length) return '';
  return '<div class="conn-badges">' + filtered.map(c => {
    const col = BADGE_COLORS[c] || '#888';
    const lbl = BADGE_SHORT[c] || c;
    return `<span class="conn-badge" style="background:${col}18;color:${col};border:1px solid ${col}40" onclick="event.stopPropagation();window.location='detail.html?id=${id}'">${lbl}</span>`;
  }).join('') + '</div>';
}

function getConnReason(item, otherItem) {
  // Find shared themes
  const myThemes = (item.themes || []).filter(t => !t.startsWith('App'));
  const otherThemes = (otherItem.themes || []).filter(t => !t.startsWith('App'));
  const sharedThemes = myThemes.filter(t => otherThemes.includes(t));
  if (sharedThemes.length > 0) {
    const label = THEME_LABELS[sharedThemes[0]] || sharedThemes[0];
    return `Opera: ${label}`;
  }
  // People connection
  const myPeople = (item.people || []).map(p => p.name.toLowerCase());
  const otherPeople = (otherItem.people || []).map(p => p.name.toLowerCase());
  const sharedPerson = myPeople.find(p => otherPeople.some(op => op.includes(p.split(',')[0]) || p.includes(op.split(',')[0])));
  if (sharedPerson) return `Persona: ${sharedPerson.split(',')[0]}`;
  return '';
}

function renderConnections(itemId) {
  const rels = CONNECTIONS[itemId];
  const panel = document.getElementById('conn-panel');
  if (!panel) return;
  const item = ALL_DATA.find(d => d.id === itemId);
  if (!rels || Object.keys(rels).length === 0) {
    panel.innerHTML = '<div class="sidebar-card conn-card"><p class="conn-empty">Nessuna connessione trovata.</p></div>';
    return;
  }
  let html = '<div class="sidebar-card conn-card"><h3>Connessioni tra sezioni</h3>';
  for (const [cat, ids] of Object.entries(rels)) {
    if (!ids.length) continue;
    const color = CAT_COLORS_MAP[cat] || '#888';
    const label = CAT_LABELS[cat] || cat;
    html += `<div class="conn-section">
      <div class="conn-section-title">
        <span class="conn-dot" style="background:${color}"></span>${label} (${ids.length})
      </div>`;
    ids.slice(0, 5).forEach(rid => {
      const rec = ALL_DATA.find(d => d.id === rid);
      if (!rec) return;
      const t = rec.title.length > 58 ? rec.title.slice(0, 58) + '…' : rec.title;
      const reason = item ? getConnReason(item, rec) : '';
      const sub = rec.subtitle || '';
      html += `<a class="conn-item" onclick="window.location.href='detail.html?id=${rec.id}'">
        <div class="conn-item-year">${rec.year}${reason ? ` · ${reason}` : ''}</div>
        <div class="conn-item-title">${t}</div>
        ${sub && sub !== rec.title ? `<div class="conn-item-sub">${sub}</div>` : ''}
      </a>`;
    });
    if (ids.length > 5) {
      html += `<a class="conn-more" href="${CAT_PAGES_MAP[cat]}">Vedi tutti in ${label} →</a>`;
    }
    html += '</div>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

let ALL_DATA = [];
let CONN_SUMMARY = {};
let CONNECTIONS = {};

// ── SHARED: build connections from raw data ──────────────────────────────────
function buildConnections(data) {
  const prim_themes = new Set();
  data.forEach(d => {
    if (d.category === 'primary bibliography')
      (d.themes || []).forEach(t => prim_themes.add(t));
  });

  // theme → { category → [ids] }
  const theme_index = {};
  data.forEach(d => {
    (d.themes || []).forEach(t => {
      if (!prim_themes.has(t) || t.startsWith('App')) return;
      if (!theme_index[t]) theme_index[t] = {};
      if (!theme_index[t][d.category]) theme_index[t][d.category] = [];
      theme_index[t][d.category].push(d.id);
    });
  });

  // normalized name → { category → [ids] }
  function norm(name) {
    name = name.trim().toLowerCase();
    if (name.includes(',')) return name;
    const parts = name.split(' ');
    return parts.length >= 2 ? parts[parts.length-1] + ', ' + parts.slice(0,-1).join(' ') : name;
  }
  const SKIP = new Set(['gadda, carlo emilio', 'gadda carlo emilio']);
  const people_index = {};
  data.forEach(d => {
    (d.people || []).forEach(p => {
      const n = norm(p.name);
      if (SKIP.has(n) || !n) return;
      if (!people_index[n]) people_index[n] = {};
      if (!people_index[n][d.category]) people_index[n][d.category] = [];
      people_index[n][d.category].push(d.id);
    });
  });
  const cross_people = {};
  Object.entries(people_index).forEach(([n, cats]) => {
    if (Object.keys(cats).length >= 2) cross_people[n] = cats;
  });

  // build per-record connections
  const connections = {};
  data.forEach(d => {
    const related = {};
    (d.themes || []).forEach(t => {
      if (!prim_themes.has(t) || t.startsWith('App')) return;
      Object.entries(theme_index[t] || {}).forEach(([cat, ids]) => {
        if (cat === d.category) return;
        if (!related[cat]) related[cat] = [];
        ids.forEach(i => { if (i !== d.id) related[cat].push(i); });
      });
    });
    (d.people || []).forEach(p => {
      const n = norm(p.name);
      if (SKIP.has(n) || !cross_people[n]) return;
      Object.entries(cross_people[n]).forEach(([cat, ids]) => {
        if (cat === d.category) return;
        if (!related[cat]) related[cat] = [];
        ids.forEach(i => { if (i !== d.id) related[cat].push(i); });
      });
    });
    // deduplicate + cap
    Object.keys(related).forEach(c => {
      const seen = [...new Set(related[c])].slice(0, 8);
      if (seen.length) related[c] = seen; else delete related[c];
    });
    if (Object.keys(related).length) connections[d.id] = related;
  });

  // conn_summary: id → [categories]
  const conn_summary = {};
  Object.entries(connections).forEach(([id, rels]) => {
    conn_summary[id] = Object.keys(rels);
  });

  return { connections, conn_summary };
}


// ── Detail page connection renderer ─────────────────────────────────────────
const CAT_LABELS_MAP = {"library":"Biblioteca","secondary bibliography":"Bib. secondaria","primary bibliography":"Bib. primaria","archive":"Archivio","letter":"Epistolario","translation":"Traduzioni"};
const CAT_PAGES_MAP = {"library":"library.html","secondary bibliography":"secondary_bibliography.html","primary bibliography":"primary_bibliography.html","archive":"archive.html","letter":"epistolario.html","translation":"translations.html"};
const CAT_COLORS_MAP = {"library": "#7a3b1e", "secondary bibliography": "#1e4a7a", "primary bibliography": "#1a6a40", "archive": "#6a3a1a", "letter": "#5a1e7a", "translation": "#6a5a1a"};

function getConnReason(item, otherItem) {
  const myT = (item.themes || []).filter(t => !t.startsWith('App'));
  const otherT = (otherItem.themes || []).filter(t => !t.startsWith('App'));
  const shared = myT.find(t => otherT.includes(t));
  if (shared) {
    // Find theme label from primary bib
    const src = ALL_DATA.find(d => d.category === 'primary bibliography' && (d.themes||[]).includes(shared));
    const label = src ? src.title.split('(')[0].trim().slice(0,45) : shared;
    return 'Opera: ' + label;
  }
  const myP = (item.people||[]).map(p => p.name.toLowerCase().split(',')[0]);
  const otherP = (otherItem.people||[]).map(p => p.name.toLowerCase().split(',')[0]);
  const sharedP = myP.find(p => p.length > 2 && otherP.some(op => op.includes(p) || p.includes(op)));
  if (sharedP) return 'Persona: ' + sharedP;
  return '';
}

function renderConnections(itemId) {
  const panel = document.getElementById('conn-panel');
  if (!panel) return;
  const rels = CONNECTIONS[itemId];
  const item = ALL_DATA.find(d => d.id === itemId);
  if (!rels || !Object.keys(rels).length) {
    panel.innerHTML = '<div class="sidebar-card conn-card"><p class="conn-empty">Nessuna connessione trovata.</p></div>';
    return;
  }
  let html = '<div class="sidebar-card conn-card"><h3>Connessioni tra sezioni</h3>';
  for (const [cat, ids] of Object.entries(rels)) {
    const color = CAT_COLORS_MAP[cat] || '#888';
    const label = CAT_LABELS_MAP[cat] || cat;
    html += `<div class="conn-section"><div class="conn-section-title"><span class="conn-dot" style="background:${color}"></span>${label} (${ids.length})</div>`;
    ids.slice(0,5).forEach(rid => {
      const rec = ALL_DATA.find(d => d.id === rid);
      if (!rec) return;
      const t = rec.title.length > 58 ? rec.title.slice(0,58)+'…' : rec.title;
      const reason = item ? getConnReason(item, rec) : '';
      const sub = rec.subtitle && rec.subtitle !== rec.title ? rec.subtitle : '';
      html += `<a class="conn-item" onclick="window.location.href='detail.html?id=${rec.id}'">
        <div class="conn-item-year">${rec.year}${reason ? ' · '+reason : ''}</div>
        <div class="conn-item-title">${t}</div>
        ${sub ? '<div class="conn-item-sub">'+sub+'</div>' : ''}
      </a>`;
    });
    if (ids.length > 5) html += `<a class="conn-more" href="${CAT_PAGES_MAP[cat]}">Vedi tutti →</a>`;
    html += '</div>';
  }
  html += '</div>';
  panel.innerHTML = html;
}

function navigateTo(id) {
  window.location.href = 'detail.html?id=' + id;
}

function normalizeCitazione(s) {
  if (!s) return s;
  // Remove 'nan,' prefix on anonymous entries
  s = s.replace(/^nan,\s*/i, '');
  // Convert DD/MM/YYYY to Italian: 14/11/1993 → 14 novembre 1993
  const MESI = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
  s = s.replace(/\b(\d{1,2})\/(\d{2})\/(\d{4})\b/g, (_, d, m, y) => {
    const mese = MESI[parseInt(m, 10) - 1];
    return mese ? `${parseInt(d, 10)} ${mese} ${y}` : _;
  });
  // Lowercase Italian articles/prepositions inside «» except the first word
  const PICCOLE = new Set(['del','della','dello','delle','dei','degli','di','il','lo','la','le','gli','i','un','una','uno','e','a','da','in','con','su','per','tra','fra','al','alla','alle','agli','ai','dal','dalla','dalle','dagli','dai','nel','nella','nelle','negli','nei','sul','sulla','sulle','sugli','sui']);
  s = s.replace(/«([^»]+)»/g, (_, inner) => {
    return '«' + inner.split(' ').map((w, i) => (i > 0 && PICCOLE.has(w.toLowerCase())) ? w.toLowerCase() : w).join(' ') + '»';
  });
  return s;
}

function parseAuthorFull(s) {
  if (!s || s === 'No Author') return null;
  const parts = s.split(',');
  return parts.length > 1 ? parts[1].trim() + ' ' + parts[0].trim() : s;
}

function parseDetail(detail) {
  if (!detail) return null;
  const parts = detail.split(' · ');
  if (parts.length === 1) return { pub: parts[0], city: null };
  return { pub: parts[0], city: parts[1] };
}

function isGaddaAuthor(item) {
  // Returns true if Gadda is effectively the sole/implicit author
  // (primary bib, archive = always Gadda; letters = Gadda always involved)
  return ['primary bibliography', 'archive', 'letter'].includes(item.category);
}

function findRelated(item, limit=15) {
  if (isGaddaAuthor(item)) return []; // Skip — Gadda is author of everything in these sections

  // Library: group by same author (subtitle)
  if (item.category === 'library') {
    if (!item.subtitle || item.subtitle === 'No Author') return [];
    return ALL_DATA.filter(d =>
      d.id !== item.id &&
      d.category === 'library' &&
      d.subtitle === item.subtitle
    ).slice(0, limit);
  }

  // Secondary bib: group by same critic
  if (item.category === 'secondary bibliography') {
    if (!item.subtitle) return [];
    return ALL_DATA.filter(d =>
      d.id !== item.id &&
      d.category === 'secondary bibliography' &&
      d.subtitle === item.subtitle
    ).slice(0, limit);
  }

  // Translation: group by same language
  if (item.category === 'translation') {
    if (!item.subtitle) return [];
    return ALL_DATA.filter(d =>
      d.id !== item.id &&
      d.category === 'translation' &&
      d.subtitle === item.subtitle
    ).slice(0, limit);
  }

  return [];
}

function findSameYear(item, limit=12) {
  if (item.category === 'primary bibliography' || item.category === 'archive') {
    // Cross-category: show what else happened that year (letters, archive, secbib)
    return ALL_DATA.filter(d =>
      d.id !== item.id &&
      d.year === item.year &&
      d.category !== item.category
    ).slice(0, limit);
  }
  // Same category, same year
  return ALL_DATA.filter(d =>
    d.id !== item.id &&
    d.year === item.year &&
    d.category === item.category
  ).slice(0, limit);
}

function findRelatedByTheme(item, limit=20) {
  const myThemes = (item.themes || []).filter(t => !t.startsWith('App'));
  if (!myThemes.length) return [];
  // Find records in OTHER categories that share at least one theme
  return ALL_DATA.filter(d => {
    if (d.id === item.id || d.category === item.category) return false;
    const otherThemes = (d.themes || []).filter(t => !t.startsWith('App'));
    return myThemes.some(t => otherThemes.includes(t));
  }).slice(0, limit);
}

function sharedThemeLabel(item, other) {
  const myThemes = (item.themes || []).filter(t => !t.startsWith('App'));
  const otherThemes = (other.themes || []).filter(t => !t.startsWith('App'));
  const shared = myThemes.filter(t => otherThemes.includes(t));
  if (!shared.length) return '';
  // Find a primary bib record with this theme to get a human label
  const src = ALL_DATA.find(d => d.category === 'primary bibliography' && (d.themes||[]).includes(shared[0]));
  if (src) return src.title.split('(')[0].trim().slice(0, 40);
  return shared[0];
}

function buildCollapsiblePanel(title, items, renderFn, panelId) {
  const SHOW = 3;
  const visible = items.slice(0, SHOW);
  const hidden = items.slice(SHOW);
  let inner = visible.map(renderFn).join('');
  if (hidden.length) {
    inner += '<div data-more="' + panelId + '" style="display:none">' + hidden.map(renderFn).join('') + '</div>';
    inner += '<button class="show-more-btn" data-toggle="' + panelId + '" data-count="' + hidden.length + '">' +
      'Mostra altri ' + hidden.length + ' →' +
    '</button>';
  }
  return '<div class="sidebar-card"><h3>' + title + '</h3>' + inner + '</div>';
}

function toggleMore(panelId, btn) {
  const el = document.querySelector('[data-more="' + panelId + '"]');
  if (!el) return;
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? '' : 'none';
  btn.textContent = isHidden ? '← Mostra meno' : 'Mostra altri ' + btn.dataset.count + ' →';
}

// Wire up collapsible buttons via event delegation
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-toggle]');

});

function buildGenealogyPanel(item) {
  const genitore = (item.genitore||[]).filter(Boolean);
  const figlio = ALL_DATA
    .filter(d => d.id !== item.id && (d.genitore||[]).includes(item.id))
    .map(d => d.id);
  const collegate = (item.opere_collegate||[]).filter(Boolean);
  const collegateInverse = ALL_DATA
    .filter(d => d.id !== item.id && (d.opere_collegate||[]).includes(item.id))
    .map(d => d.id);
  if (!genitore.length && !figlio.length && !collegate.length && !collegateInverse.length) return '';

  function sortIds(ids) {
    return [...ids].sort((a, b) => {
      const ra = INDEX[a], rb = INDEX[b];
      if (!ra || !rb) return 0;
      return (ra.year || 0) - (rb.year || 0);
    });
  }

  function genealogyItem(rid, fallbackLabel) {
    const rec = INDEX[rid];
    const title = rec ? (rec.title.length>65 ? rec.title.slice(0,65)+'…' : rec.title) : (fallbackLabel || rid);
    const year  = rec ? rec.year : '';
    return '<a href="detail.html?id=' + rid + '" class="conn-item">' +
      (year ? '<div class="conn-item-year">' + year + '</div>' : '') +
      '<div class="conn-item-title">' + title + '</div>' +
    '</a>';
  }

  function renderSection(label, color, ids, fallbackLabel) {
    if (!ids.length) return '';
    return '<div class="conn-section" data-section="' + label + '">' +
      '<div class="conn-section-title"><span class="conn-dot" style="background:' + color + '"></span>' + label + '</div>' +
      '<div class="genealogy-items">' + ids.map(id => genealogyItem(id, fallbackLabel)).join('') + '</div>' +
    '</div>';
  }

  let html = '<div class="sidebar-card"><h3>Struttura dell\'opera</h3>' +
    renderSection('Fa parte di',       'var(--accent)',      sortIds(genitore)) +
    renderSection('Contiene',          'var(--accent)',      sortIds(figlio)) +
    renderSection('Opera collegata',   'var(--accent-blue)', sortIds(collegate), item.opera_collegata) +
    renderSection('Collegata a questo','var(--accent-blue)', sortIds(collegateInverse)) +
    '</div>';
  return html;
}

function buildThemePanel(item, byTheme) {
  const CAT_COLORS_LOCAL = {"library":"#7a3b1e","secondary bibliography":"#1e4a7a","primary bibliography":"#1a6a40","archive":"#6a3a1a","letter":"#5a1e7a","translation":"#6a5a1a"};
  function renderThemeItem(r) {

    const workLabel = label ? '<span style="font-size:0.8rem;color:var(--muted)">Opera: ' + label + '</span>' : '';
    return '<div class="related-item" onclick="navigateTo(\'' + r.id + '\')">' +
      '<div class="related-year" style="color:' + col + '">' + r.year + '</div>' +
      '<div>' +

        '<div class="related-author">' + catBadge + workLabel + '</div>' +

  return buildCollapsiblePanel('Legati alla stessa opera', byTheme, renderThemeItem, 'theme');
}

  const themeHtml = byTheme.length ? buildThemePanel(item, byTheme) : '';

  document.getElementById('content').innerHTML = `
    <div class="page-wrap">
      <div class="main-card">
        <span class="cat-tag ${catClass(item.category)}">${catLabel(item.category)}</span>
        <h1 class="record-title">${item.title}</h1>
        ${author ? `<div class="record-author">${author}</div>` : ''}
        <hr class="divider">
        <table class="meta-table">
          ${metaRows.map(([k,v]) => k === 'Identificativo'
            ? `<tr><td>${k}</td><td><span class="id-display">${item.id}</span></td></tr>`
            : `<tr><td>${k}</td><td>${v}</td></tr>`
          ).join('')}
        </table>
        <button class="cite-btn" onclick="openCiteModal()">Cita questo record</button>
      </div>

      <div>
        ${genealogyHtml}
        ${relatedHtml}
        ${sameYearHtml}
        ${themeHtml}
      <div id='conn-panel' class='conn-panel'></div>
      </div>
    </div>`;
}

// ── Citation export ─────────────────────────────────────────────────────────
window._citeItem = item;

function buildCitation(item, style) {
  const people = item.people || [];
  const authors = people.filter(p => ['autore','curatore','traduttore','mittente'].includes(p.role));
  const firstAuthor = authors.length ? authors[0].name : null;

  // Helper: "Surname, Firstname" → "Firstname Surname"
  function nameNormal(n) {
    if (!n) return '';
    const parts = n.split(',');
    return parts.length > 1 ? parts[1].trim() + ' ' + parts[0].trim() : n;
  }
  // Helper: all authors formatted
  function authorList(sep) {
    if (!authors.length) return 'OpenGadda';
    return authors.map((a,i) => {
      if (style === 'bibtex') return nameNormal(a.name);
      if (i === 0) return a.name; // Last, First for first author
      return nameNormal(a.name); // First Last for subsequent
    }).join(sep);
  }

  const title = item.title || 'Senza titolo';
  const year = item.year || 's.d.';
  const pub = item.casa_editrice || item.editore || item.rivista || '';
  const city = item.luogo_di_pubblicazione || '';
  const url = `https://opengadda.it/detail.html?id=${item.id}`;
  const accessed = new Date().toLocaleDateString('it-IT', {day:'numeric',month:'long',year:'numeric'});
  const catLabel = {'primary bibliography':'Opere','secondary bibliography':'Critica','library':'Biblioteca','archive':'Archivio','letter':'Epistolario','translation':'Traduzioni'}[item.category] || '';

  if (style === 'chicago') {
    let c = firstAuthor ? `${firstAuthor}. ` : '';
    c += `«${title}». `;
    if (pub) c += city ? `${city}: ${pub}, ` : `${pub}, `;
    c += `${year}. `;
    c += `OpenGadda — ${catLabel}. `;
    c += `<${url}> (consultato il ${accessed}).`;
    return c;
  }
  if (style === 'mla') {
    let c = firstAuthor ? `${firstAuthor}. ` : '';
    c += `"${title}." `;
    if (pub) c += `${pub}, `;
    c += `${year}. `;
    c += `OpenGadda, ${url}. `;
    c += `Consultato il ${accessed}.`;
    return c;
  }
  if (style === 'bibtex') {
    const key = (firstAuthor ? firstAuthor.split(',')[0].replace(/\s/g,'') : 'OpenGadda') + year;
    const type = item.category === 'primary bibliography' ? '@book' : '@misc';
    let b = `${type}{${key},\n`;
    if (authors.length) b += `  author    = {${authorList(' and ')}},\n`;
    b += `  title     = {${title}},\n`;
    b += `  year      = {${year}},\n`;
    if (pub) b += `  publisher = {${pub}},\n`;
    if (city) b += `  address   = {${city}},\n`;
    b += `  howpublished = {\\url{${url}}},\n`;
    b += `  note      = {OpenGadda — ${catLabel}. Consultato il ${accessed}}\n}`;
    return b;
  }
}

window.openCiteModal = function() {
  document.getElementById('cite-overlay').classList.add('open');
  switchCiteTab('chicago');
};
window.closeCiteModal = function() {
  document.getElementById('cite-overlay').classList.remove('open');
};
window.switchCiteTab = function(style) {
  document.querySelectorAll('.cite-tab').forEach(t => t.classList.toggle('active', t.dataset.style === style));
  document.getElementById('cite-output').textContent = buildCitation(window._citeItem, style);
};
window.copyCitation = function() {
  const text = document.getElementById('cite-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cite-copy-btn');
    btn.textContent = 'Copiato ✓';
    setTimeout(() => btn.textContent = 'Copia', 1800);
  });
};
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCiteModal(); });

// Call connections after render
const _origId = id;
  })
  .catch(err => {
    document.getElementById('content').innerHTML = '<p style="padding:2rem;color:#c00;font-family:monospace">Errore nel caricamento di items.json: ' + err + '</p>';
  });

</script>

<div class="cite-overlay" id="cite-overlay" onclick="if(event.target===this)closeCiteModal()">
  <div class="cite-box">
    <h2>Cita questo record</h2>
    <div class="cite-tabs">
      <button class="cite-tab active" data-style="chicago" onclick="switchCiteTab('chicago')">Chicago</button>
      <button class="cite-tab" data-style="mla" onclick="switchCiteTab('mla')">MLA</button>
      <button class="cite-tab" data-style="bibtex" onclick="switchCiteTab('bibtex')">BibTeX</button>
    </div>
    <div class="cite-output" id="cite-output"></div>
    <div class="cite-actions">
      <button class="cite-close-btn" onclick="closeCiteModal()">Chiudi</button>
      <button class="cite-copy-btn" id="cite-copy-btn" onclick="copyCitation()">Copia</button>
    </div>
  </div>
</div>
