const ROLE_COLOR = {
  mittente:    '#e07b54',
  destinatario:'#e07b54',
  autore:      '#4e79a7',
  curatore:    '#8ab87a',
  traduttore:  '#b89a6a',
};

const X0 = 1500, X1 = 2000;  // full x domain
const GADDA_Y0 = 0, GADDA_H = 80;
const ROW_H = 18;
const W = 1400;
const totalH = GADDA_H + PERSONS.length * ROW_H;

const svg = d3.select('#svg')
  .attr('width', W)
  .attr('height', totalH);

const x = d3.scaleLinear().domain([X0, X1]).range([0, W]);

// ---- Gadda area ----
const gG = svg.append('g');

// shaded gadda lifespan band
gG.append('rect')
  .attr('x', x(1893)).attr('y', 0)
  .attr('width', x(1973) - x(1893)).attr('height', GADDA_H)
  .attr('fill', '#f5f5f5');

// x axis inside gadda area
const xAxis = d3.axisBottom(x).tickFormat(d3.format('d')).ticks(20);
gG.append('g').attr('transform', `translate(0,${GADDA_H - 1})`).call(xAxis)
  .selectAll('text').style('font-size','10px');

// gadda count line
const gY = d3.scaleLinear()
  .domain([0, d3.max(GADDA, d => d.count)])
  .range([GADDA_H - 20, 4]);

const line = d3.line().x(d => x(d.year)).y(d => gY(d.count)).curve(d3.curveCatmullRom);
gG.append('path').datum(GADDA)
  .attr('fill','none').attr('stroke','#4e79a7').attr('stroke-width',1.5)
  .attr('d', line);

gG.selectAll('.gdot').data(GADDA).join('circle').attr('class','gdot')
  .attr('cx', d => x(d.year)).attr('cy', d => gY(d.count))
  .attr('r', 2.5).attr('fill','#4e79a7').attr('stroke','#fff').attr('stroke-width',0.5);

// ---- Person rows ----
const tip = d3.select('#tooltip');
const namesList = document.getElementById('names-list');

document.getElementById('info').textContent = `${PERSONS.length} persone con date`;

PERSONS.forEach((person, i) => {
  const y = GADDA_H + i * ROW_H + ROW_H / 2;

  // name label
  const div = document.createElement('div');
  div.className = 'row-name';
  div.title = person.name;
  div.textContent = person.name;
  namesList.appendChild(div);

  // lifespan line
  const bx = x(Math.max(person.birth, X0));
  const dx = x(Math.min(person.death || 2000, X1));
  svg.append('line')
    .attr('x1', bx).attr('x2', dx)
    .attr('y1', y).attr('y2', y)
    .attr('stroke', '#ccc').attr('stroke-width', 1);

  // birth / death ticks
  svg.append('line').attr('x1', bx).attr('x2', bx).attr('y1', y-3).attr('y2', y+3).attr('stroke','#bbb').attr('stroke-width',1);
  if (person.death) {
    const ddx = x(Math.min(person.death, X1));
    svg.append('line').attr('x1', ddx).attr('x2', ddx).attr('y1', y-3).attr('y2', y+3).attr('stroke','#bbb').attr('stroke-width',1);
  }

  // interaction dots
  person.items.forEach(it => {
    const color = ROLE_COLOR[it.role] || '#999';
    svg.append('circle')
      .attr('cx', x(it.year)).attr('cy', y)
      .attr('r', 3.5)
      .attr('fill', color).attr('stroke','#fff').attr('stroke-width',0.5)
      .style('cursor','pointer')
      .on('mouseover', (event) => {
        tip.style('opacity',1)
          .html(`<b>${person.name}</b> (${person.birth}–${person.death||'?'})<br>${it.year} · ${it.role}<br><span style="color:#aaa">${it.title}</span>`);
      })
      .on('mousemove', event => tip.style('left',(event.clientX+14)+'px').style('top',(event.clientY-10)+'px'))
      .on('mouseout', () => tip.style('opacity',0));
  });
});
</script>
</body>
</html>
