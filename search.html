<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGadda — Ricerca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814; --paper: #f5f0e8; --accent: #7a3b1e; --accent-light: #c8794a;
  --muted: #7a7268; --border: #c8bfaa; --white: #fdfaf5; --tag-bg: #e8dfd0; --tag-text: #7a3b1e;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'EB Garamond',Georgia,serif; background:var(--paper); color:var(--ink); }
nav { background:var(--ink); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 2.5rem; gap:2rem; height:52px; position:sticky; top:0; z-index:100; }
.nav-brand { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.18em; color:var(--white); text-decoration:none; margin-right:auto; }
nav a { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#9a9080; text-decoration:none; transition:color 0.2s; }
nav a:hover { color:#e8c89a; }

header { background:var(--ink); color:var(--white); padding:2.5rem 2.5rem 2rem; border-bottom:3px solid var(--accent); }
header .eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#5a5248; margin-bottom:0.5rem; }
header h1 { font-size:2.4rem; font-weight:400; font-style:italic; margin-bottom:0.4rem; }
header p { color:#9a9080; font-size:1rem; }

.layout { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 180px); }
.sidebar { background:var(--white); border-right:1px solid var(--border); padding:1.5rem 1.25rem; position:sticky; top:52px; height:calc(100vh - 52px); overflow-y:auto; }
.sidebar-section { margin-bottom:1.75rem; }
.sidebar-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; display:block; }
.sidebar input[type=text] { width:100%; padding:0.5rem 0.6rem; font-family:'EB Garamond',serif; font-size:1rem; border:1px solid var(--border); background:var(--paper); color:var(--ink); border-radius:2px; outline:none; }
.sidebar input[type=text]:focus { border-color:var(--accent); }
.filter-group { display:flex; flex-direction:column; gap:3px; }
.filter-btn { text-align:left; background:none; border:none; padding:0.3rem 0.5rem; font-family:'EB Garamond',serif; font-size:0.9rem; color:var(--muted); cursor:pointer; border-radius:2px; display:flex; justify-content:space-between; align-items:center; transition:background 0.15s,color 0.15s; }
.filter-btn:hover { background:var(--tag-bg); color:var(--ink); }
.filter-btn.active { background:var(--accent); color:var(--white); }
.filter-btn .count { font-family:'DM Mono',monospace; font-size:10px; opacity:0.7; flex-shrink:0; margin-left:6px; }

.main { padding:1.5rem 2rem; }
.stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:3px; margin-bottom:1.25rem; overflow:hidden; }
.stat { background:var(--white); padding:0.75rem 1rem; text-align:center; }
.stat-n { font-family:'DM Mono',monospace; font-size:1.3rem; font-weight:500; color:var(--accent); display:block; }
.stat-l { font-size:0.8rem; color:var(--muted); }

.entry { border-bottom:1px solid var(--border); padding:0.9rem 0.25rem; display:grid; grid-template-columns:64px 1fr auto; gap:0.75rem; align-items:start; transition:background 0.15s; cursor:pointer; }
.entry:hover { background:var(--white); padding-left:0.5rem; padding-right:0.5rem; margin:0 -0.25rem; }
.entry-year { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); padding-top:3px; text-align:right; }
.entry-title { font-size:1rem; font-weight:500; line-height:1.3; color:var(--ink); margin-bottom:3px; }
.entry-source { font-family:'DM Mono',monospace; font-size:10px; color:#9a9080; letter-spacing:0.04em; }
.type-tag { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; background:var(--tag-bg); color:var(--tag-text); padding:2px 6px; border-radius:2px; white-space:nowrap; flex-shrink:0; align-self:start; margin-top:3px; }

.section-header { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); padding:1.25rem 0.25rem 0.4rem; border-top:2px solid var(--border); margin-top:0.5rem; display:flex; justify-content:space-between; align-items:center; }
.section-header:first-child { border-top:none; margin-top:0; padding-top:0.4rem; }
.section-header a { font-size:9px; color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent); }
.section-header a:hover { opacity:0.7; }

.no-results { text-align:center; padding:4rem 1rem; color:var(--muted); font-style:italic; font-size:1.1rem; }
.pagination { display:flex; gap:6px; justify-content:center; margin-top:2rem; flex-wrap:wrap; }
.page-btn { font-family:'DM Mono',monospace; font-size:11px; border:1px solid var(--border); background:none; color:var(--muted); padding:4px 12px; cursor:pointer; border-radius:2px; }
.page-btn.active { background:var(--ink); color:var(--white); border-color:var(--ink); }
.page-btn:hover:not(.active) { background:var(--tag-bg); }

@media(max-width:700px) { .layout { grid-template-columns:1fr; } .sidebar { position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); } }

.conn-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.conn-badge { font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; border-radius:2px; font-weight:600; letter-spacing:0.05em; white-space:nowrap; cursor:pointer; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">OpenGadda</a>
  <a href="archive.html">Archivio</a>
  <a href="primary_bibliography.html">Bib. primaria</a>
  <a href="secondary_bibliography.html">Bib. secondaria</a>
  <a href="library.html">Biblioteca</a>
  <a href="epistolario.html">Epistolario</a>
  <a href="translations.html">Traduzioni</a>
</nav>

<header>
  <div class="eyebrow">Ricerca nel dataset</div>
  <h1 id="header-title">Risultati</h1>
  <p id="header-sub"></p>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <span class="sidebar-label">Affina la ricerca</span>
      <input type="text" id="search" placeholder="Modifica ricerca…" oninput="applyFilters()">
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Sezione</span>
      <div class="filter-group" id="cat-btns"></div>
    </div>
    <div class="sidebar-section">
      <span class="sidebar-label">Ordinamento</span>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setSort('year')" id="s-year">Cronologico</button>
        <button class="filter-btn" onclick="setSort('cat')" id="s-cat">Per sezione</button>
        <button class="filter-btn" onclick="setSort('title')" id="s-title">Titolo</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="stats-bar">
      <div class="stat"><span class="stat-n" id="sn-total">0</span><span class="stat-l">risultati</span></div>
      <div class="stat"><span class="stat-n" id="sn-cats">0</span><span class="stat-l">sezioni</span></div>
      <div class="stat"><span class="stat-n" id="sn-years">0</span><span class="stat-l">anni distinti</span></div>
    </div>
    <div id="entries"></div>
    <div id="pagination" class="pagination"></div>
  </main>
</div>

<script>
const PER_PAGE = 60;
const CAT_LABELS = {"library":"Biblioteca","secondary bibliography":"Bib. secondaria","primary bibliography":"Bib. primaria","archive":"Archivio","letter":"Epistolario","translation":"Traduzioni"};
const CAT_PAGES  = {"library":"library.html","secondary bibliography":"secondary_bibliography.html","primary bibliography":"primary_bibliography.html","archive":"archive.html","letter":"epistolario.html","translation":"translations.html"};
const CAT_COLORS = {"library":"#7a3b1e","secondary bibliography":"#1e4a7a","primary bibliography":"#1a6a40","archive":"#6a3a1a","letter":"#5a1e7a","translation":"#6a5a1a"};

let ALL_DATA = [];
let filtered = [];
let activeQuery = '';
let activeCat = null;
let sortKey = 'year';
let sortDir = 1;
let currentPage = 1;
let CONN_SUMMARY = {};

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase() || activeQuery.toLowerCase();
  filtered = ALL_DATA.filter(d => {
    if (activeCat && d.category !== activeCat) return false;
    const haystack = [d.title, d.subtitle, d.detail, d.archivio, d.fondo,
                      d.casa_editrice, d.luogo_di_pubblicazione,
                      ...(d.people||[]).map(p => p.name),
                      ...(d.themes||[])].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  });
  doSort(); currentPage = 1; render();
}

function doSort() {
  filtered.sort((a, b) => {
    if (sortKey === 'year') return sortDir * ((a.year||0) - (b.year||0));
    if (sortKey === 'cat') return (a.category||'').localeCompare(b.category||'');
    return sortDir * (a.title||'').localeCompare(b.title||'');
  });
}

function setSort(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  ['year','cat','title'].forEach(k => document.getElementById('s-'+k).classList.toggle('active', k === key));
  doSort(); render();
}

function entryHtml(d) {
  const col = CAT_COLORS[d.category] || '#888';
  const catLabel = CAT_LABELS[d.category] || d.category;
  const subtitle = d.subtitle && d.subtitle !== d.title ? d.subtitle : '';
  const detail = d.detail || '';
  const source = [subtitle, detail].filter(Boolean).join(' · ');
  return `<div class="entry" onclick="window.location.href='detail.html?id=${d.id}'">
    <div class="entry-year">${d.year||'—'}</div>
    <div>
      <div class="entry-title">${d.title||''}</div>
      ${source ? `<div class="entry-source">${source}</div>` : ''}
    </div>
    <span class="type-tag" style="background:${col}18;color:${col};border:1px solid ${col}30">${catLabel}</span>
  </div>`;
}

function render() {
  document.getElementById('sn-total').textContent = filtered.length.toLocaleString('it');
  document.getElementById('sn-cats').textContent = new Set(filtered.map(d => d.category)).size;
  document.getElementById('sn-years').textContent = new Set(filtered.map(d => d.year).filter(Boolean)).size;

  if (!filtered.length) {
    document.getElementById('entries').innerHTML = '<div class="no-results">Nessun risultato trovato.</div>';
    document.getElementById('pagination').innerHTML = ''; return;
  }

  if (sortKey === 'cat') {
    // Group by section
    const groups = {};
    filtered.forEach(d => {
      if (!groups[d.category]) groups[d.category] = [];
      groups[d.category].push(d);
    });
    const order = ['primary bibliography','secondary bibliography','library','archive','letter','translation'];
    const cats = order.filter(c => groups[c]);
    document.getElementById('entries').innerHTML = cats.map(cat => {
      const label = CAT_LABELS[cat] || cat;
      const page = CAT_PAGES[cat] || '#';
      const items = groups[cat];
      return `<div class="section-header"><span>${label} (${items.length})</span><a href="${page}">Vai alla sezione →</a></div>` +
        items.map(entryHtml).join('');
    }).join('');
    document.getElementById('pagination').innerHTML = '';
  } else {
    const start = (currentPage-1)*PER_PAGE;
    const page = filtered.slice(start, start+PER_PAGE);
    document.getElementById('entries').innerHTML = page.map(entryHtml).join('');
    const totalPages = Math.ceil(filtered.length/PER_PAGE);
    let pages = '';
    for (let i=1; i<=totalPages; i++) {
      if (i===1||i===totalPages||Math.abs(i-currentPage)<=3)
        pages += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      else if (Math.abs(i-currentPage)===4)
        pages += `<span style="padding:4px;color:#999;font-size:11px">…</span>`;
    }
    document.getElementById('pagination').innerHTML = pages;
  }
}

function goPage(n) { currentPage=n; render(); window.scrollTo(0,0); }

function buildCatBtns() {
  const counts = {};
  ALL_DATA.forEach(d => { if (filtered.find(f => f.id === d.id)) counts[d.category] = (counts[d.category]||0)+1; });
  const container = document.getElementById('cat-btns');
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.innerHTML = `Tutte le sezioni <span class="count">${filtered.length}</span>`;
  allBtn.id = 'cat-all';
  allBtn.onclick = () => { activeCat = null; container.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); applyFilters(); };
  container.appendChild(allBtn);
  const order = ['primary bibliography','secondary bibliography','library','archive','letter','translation'];
  order.forEach(cat => {
    const cnt = ALL_DATA.filter(d => {
      if (d.category !== cat) return false;
      const q = document.getElementById('search').value.toLowerCase() || activeQuery.toLowerCase();
      const h = [d.title,d.subtitle,d.detail,d.archivio,d.fondo,...(d.people||[]).map(p=>p.name)].filter(Boolean).join(' ').toLowerCase();
      return h.includes(q);
    }).length;
    if (!cnt) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerHTML = `${CAT_LABELS[cat]||cat} <span class="count">${cnt}</span>`;
    btn.onclick = () => {
      activeCat = cat;
      container.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };
    container.appendChild(btn);
  });
}

fetch('items.json').then(r=>r.json()).then(data => {
  ALL_DATA = data;
  const urlQ = new URLSearchParams(window.location.search).get('q') || '';
  activeQuery = decodeURIComponent(urlQ);
  document.getElementById('search').value = activeQuery;
  document.getElementById('header-title').textContent = '"' + activeQuery + '"';
  applyFilters();
  buildCatBtns();
  document.getElementById('header-sub').textContent = filtered.length + ' risultati in tutto il dataset';
}).catch(err => {
  document.getElementById('entries').innerHTML = '<p style="padding:2rem;color:#c00;font-family:monospace">Errore: ' + err + '</p>';
});
</script>
</body>
</html>
