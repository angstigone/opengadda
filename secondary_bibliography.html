<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenGadda — Bibliografia Secondaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --paper: #f5f0e8;
  --paper2: #ede8dc;
  --accent: #1e4a7a;
  --accent-light: #4a82b8;
  --muted: #7a7268;
  --border: #c8bfaa;
  --white: #fdfaf5;
  --tag-bg: #dce6f0;
  --tag-text: #1e4a7a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'EB Garamond', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
nav { background:var(--ink); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 2.5rem; gap:2rem; height:52px; position:sticky; top:0; z-index:100; }
.nav-brand { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.18em; color:var(--white); text-decoration:none; margin-right:auto; }
nav a { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#9a9080; text-decoration:none; transition:color 0.2s; }
nav a:hover, nav a.active { color:#e8c89a; }
header { background:var(--ink); color:var(--white); padding:2.5rem 2.5rem 2rem; border-bottom:3px solid var(--accent); }
header .eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:#5a5248; margin-bottom:0.5rem; }
header h1 { font-size:2.4rem; font-weight:400; font-style:italic; margin-bottom:0.4rem; }
header p { color:#9a9080; font-size:1rem; }

.layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 160px); }
.sidebar {
  background: var(--white); border-right: 1px solid var(--border);
  padding: 1.5rem 1.25rem; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto;
}
.sidebar-section { margin-bottom: 1.75rem; }
.sidebar-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; display: block; }
.sidebar input[type=text] {
  width: 100%; padding: 0.5rem 0.6rem;
  font-family: 'EB Garamond', serif; font-size: 1rem;
  border: 1px solid var(--border); background: var(--paper);
  color: var(--ink); border-radius: 2px; outline: none;
}
.sidebar input[type=text]:focus { border-color: var(--accent); }
.range-wrap { display: flex; gap: 6px; align-items: center; font-size: 0.85rem; color: var(--muted); }
.range-wrap input[type=number] {
  width: 70px; padding: 0.3rem 0.4rem;
  font-family: 'DM Mono', monospace; font-size: 12px;
  border: 1px solid var(--border); background: var(--paper);
  color: var(--ink); border-radius: 2px; outline: none;
}
.filter-group { display: flex; flex-direction: column; gap: 3px; }
.filter-btn {
  text-align: left; background: none; border: none;
  padding: 0.3rem 0.5rem; font-family: 'EB Garamond', serif; font-size: 0.95rem;
  color: var(--muted); cursor: pointer; border-radius: 2px;
  display: flex; justify-content: space-between; align-items: center;
  transition: background 0.15s, color 0.15s;
}
.filter-btn:hover { background: var(--tag-bg); color: var(--ink); }
.filter-btn.active { background: var(--accent); color: var(--white); }
.filter-btn .count { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.7; }

.update-notice {
  margin: 0 0 0; padding: 0.7rem 1rem;
  background: var(--tag-bg); border-left: 3px solid var(--accent);
  font-size: 0.85rem; color: var(--tag-text);
  display: flex; align-items: center; gap: 8px;
}
.update-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.main { padding: 1.5rem 2rem; }
.stats-bar {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: 3px;
  margin-bottom: 1.25rem; overflow: hidden;
}
.stat { background: var(--white); padding: 0.75rem 1rem; text-align: center; }
.stat-n { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; color: var(--accent); display: block; }
.stat-l { font-size: 0.8rem; color: var(--muted); }

.entries { display: flex; flex-direction: column; }
.entry {
  border-bottom: 1px solid var(--border);
  padding: 0.9rem 0.25rem;
  display: grid; grid-template-columns: 64px 1fr auto;
  gap: 0.75rem; align-items: start;
  transition: background 0.15s; cursor: pointer;
}
.entry:hover { background: var(--white); padding-left: 0.5rem; padding-right: 0.5rem; margin: 0 -0.25rem; }
.entry-year { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); padding-top: 3px; text-align: right; }
.entry-title { font-size: 1.05rem; font-weight: 500; line-height: 1.35; color: var(--ink); margin-bottom: 3px; }
.entry-author { font-size: 0.95rem; font-style: italic; color: var(--muted); margin-bottom: 4px; }
.entry-source {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #9a9080; letter-spacing: 0.04em;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.source-venue {
  background: var(--tag-bg); color: var(--tag-text);
  padding: 1px 6px; border-radius: 2px; font-size: 10px;
}
.type-tag {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 2px 7px; border-radius: 2px; white-space: nowrap;
  background: var(--tag-bg); color: var(--tag-text);
  border: 1px solid #b8cfe0; align-self: start; margin-top: 3px;
}

.pagination { display: flex; gap: 6px; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
.page-btn {
  font-family: 'DM Mono', monospace; font-size: 11px;
  border: 1px solid var(--border); background: none; color: var(--muted);
  padding: 4px 12px; cursor: pointer; border-radius: 2px;
}
.page-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.page-btn:hover:not(.active) { background: var(--tag-bg); }
.no-results { text-align: center; padding: 4rem 1rem; color: var(--muted); font-style: italic; font-size: 1.1rem; }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
}

.decade-header { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); padding:1.25rem 0.25rem 0.4rem; border-top:2px solid var(--border); margin-top:0.5rem; }
.decade-header:first-child { border-top:none; margin-top:0; padding-top:0.4rem; }
.person-link { color: var(--accent); cursor: pointer; border-bottom: 1px dotted var(--accent); }
.person-link:hover { border-bottom-style: solid; }
.conn-badges { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
.conn-badge { font-family:'DM Mono',monospace; font-size:9px; padding:1px 6px; border-radius:2px; font-weight:600; letter-spacing:0.05em; white-space:nowrap; cursor:pointer; }
.filter-banner { display:none; background:#dff0e8; border:1px solid #c8bfaa; border-radius:3px; padding:0.55rem 1rem; margin-bottom:1rem; align-items:center; justify-content:space-between; font-family:'DM Mono',monospace; font-size:11px; }
.filter-banner.active { display:flex; }
.filter-banner button { background:none; border:none; cursor:pointer; color:#7a7268; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.08em; }
.expand-search-btn { color:var(--accent) !important; border:1px solid var(--accent); border-radius:2px; padding:1px 8px; margin-right:8px; }

.export-bar { display:flex; gap:6px; justify-content:flex-end; margin-bottom:0.75rem; }
.export-btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1px solid var(--border); color:var(--muted); padding:4px 10px; cursor:pointer; border-radius:2px; transition:color 0.15s,border-color 0.15s; }
.export-btn:hover { color:var(--accent); border-color:var(--accent); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">OpenGadda</a>
  <a href="archive.html">Archivio</a>
  <a href="primary_bibliography.html">Bib. primaria</a>
  <a href="secondary_bibliography.html" class="active">Bib. secondaria</a>
  <a href="library.html">Biblioteca</a>
  <a href="epistolario.html">Epistolario</a>
  <a href="translations.html">Traduzioni</a>
</nav>
<header>
  <div class="eyebrow">OpenGadda</div>
  <h1>Bibliografia Secondaria</h1>
  <p>2.922 contributi critici · 1901–2025</p>
</header>

<div class="layout">
  <aside class="sidebar">

    <div class="sidebar-section">
      <span class="sidebar-label">Ricerca</span>
      <input type="text" id="search" placeholder="Titolo, autore, rivista…" oninput="applyFilters()">
    </div>

    <div class="sidebar-section">
      <span class="sidebar-label">Anno</span>
      <div class="range-wrap">
        <input type="number" id="yearFrom" value="1901" oninput="applyFilters()">
        <span>—</span>
        <input type="number" id="yearTo" value="2025" oninput="applyFilters()">
      </div>
    

    <div class="sidebar-section">
      <span class="sidebar-label">Ordinamento</span>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setSort('year')" id="s-year">Cronologico (rec.)</button>
        <button class="filter-btn" onclick="setSort('author')" id="s-author">Autore</button>
        <button class="filter-btn" onclick="setSort('title')" id="s-title">Titolo</button>
      </div>
    

    <div class="sidebar-section">
      <span class="sidebar-label">Tipologia</span>
      <div class="filter-group" id="type-btns"></div>
    </div>

    </aside>

  <main class="main">
        <div class="export-bar">
      <button class="export-btn" onclick="exportData('csv')">↓ CSV</button>
      <button class="export-btn" onclick="exportData('json')">↓ JSON</button>
    </div>
    <div class="stats-bar">
      <div class="stat"><span class="stat-n" id="sn-total">0</span><span class="stat-l">contributi totali</span></div>
      <div class="stat"><span class="stat-n" id="sn-shown">0</span><span class="stat-l">risultati</span></div>
      <div class="stat"><span class="stat-n" id="sn-authors">0</span><span class="stat-l">autori/critici</span></div>
    </div>

    <div id="filter-banner" class="filter-banner">
      <span id="filter-banner-text"></span>
      <button class="expand-search-btn" onclick="expandToDataset()">Cerca nel dataset →</button><button onclick="clearFilter()">× Torna a questa sezione</button>
    </div>
    <div id="entries" class="entries"><div style="padding:3rem 1rem;text-align:center;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)">Caricamento…</div></div>
    <div id="pagination" class="pagination"></div>
  </main>
</div>

<script>
const PER_PAGE = 60;
let currentFilterTerm = '';
function expandToDataset() {
  if (activeSidebarTheme) { const t = activeSidebarTheme; activeSidebarTheme = null; setThemeFilter(t); return; }
  if (currentFilterTerm) window.location.href = 'search.html?q=' + encodeURIComponent(currentFilterTerm);
}
let DATA = [];
let ALL_DATA = [];
let themeFilter = null;
let venueFilter = null;
let personFilter = null;
let filtered = [];
let currentPage = 1;
let sortKey = 'year';
let sortDir = -1;
let activeType = null;
let activeSidebarTheme = null;

const _lastUpdate = document.getElementById('last-update');
if (_lastUpdate) _lastUpdate.textContent = new Date().toLocaleDateString('it-IT');


function buildTypeBtns() {
  const allTypes = [...new Set(DATA.map(d => d.tipo).filter(Boolean))].sort();
  const typeBtns = document.getElementById('type-btns');
  typeBtns.innerHTML = '';
  allTypes.forEach(type => {
    const cnt = DATA.filter(d => d.tipo === type).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.innerHTML = type + ' <span class="count">' + cnt + '</span>';
    btn.onclick = () => {
      if (activeType === type) { activeType = null; btn.classList.remove('active'); }
      else {
        activeType = type;
        typeBtns.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      applyFilters();
    };
    typeBtns.appendChild(btn);
  });
}


function activateCrossFilter(label) {
  DATA = ALL_DATA;
  document.getElementById('filter-banner').classList.add('active');
  document.getElementById('filter-banner-text').textContent = label;
}

function setSectionThemeFilter(t) {
  activeSidebarTheme = t; currentFilterTerm = t;
  themeFilter = null; venueFilter = null; personFilter = null;
  document.getElementById('filter-banner').classList.add('active');
  document.getElementById('filter-banner-text').textContent = 'Scheda tematica: ' + t;
  applyFilters();
}

function setThemeFilter(t) {
  themeFilter = t; currentFilterTerm = t; venueFilter = null;
  activateCrossFilter('Ricerca trasversale — Scheda tematica: ' + t);
  applyFilters();
}

function setVenueFilter(v) {
  venueFilter = v; currentFilterTerm = v; themeFilter = null; personFilter = null;
  activateCrossFilter('Ricerca trasversale — Rivista: ' + v);
  applyFilters();
}
function setPersonFilter(name) {
  personFilter = name; currentFilterTerm = name; themeFilter = null; venueFilter = null;
  activateCrossFilter('Autore/critico: ' + name);
  applyFilters();
}

function clearFilter() {
  themeFilter = null; venueFilter = null; personFilter = null; activeSidebarTheme = null;
  DATA = ALL_DATA.filter(d => d.category === 'secondary bibliography');
  document.getElementById('filter-banner').classList.remove('active');
  buildTypeBtns();
  applyFilters();
}

function applyFilters() {
  if (themeFilter) { filtered = ALL_DATA.filter(d => (d.themes||[]).includes(themeFilter)); doSort(); currentPage = 1; render(); return; }
  if (venueFilter) { filtered = ALL_DATA.filter(d => (d.detail||'').toLowerCase().includes(venueFilter.toLowerCase())); doSort(); currentPage = 1; render(); return; }
  if (personFilter) { filtered = ALL_DATA.filter(d => (d.people||[]).some(p => p.name === personFilter)); doSort(); currentPage = 1; render(); return; }
  const q = document.getElementById('search').value.toLowerCase();
  if (activeSidebarTheme) {
    const yf2 = parseInt(document.getElementById('yearFrom').value) || 0;
    const yt2 = parseInt(document.getElementById('yearTo').value) || 9999;
    filtered = DATA.filter(d => {
      if (!(d.themes||[]).includes(activeSidebarTheme)) return false;
      if (d.year < yf2 || d.year > yt2) return false;
      if (activeType && d.tipo !== activeType) return false;
      if (q && !((d.title||'').toLowerCase().includes(q) || (d.subtitle||'').toLowerCase().includes(q) || (d.detail||'').toLowerCase().includes(q))) return false;
      return true;
    });
    doSort(); currentPage = 1; render(); return;
  }
  const yf = parseInt(document.getElementById('yearFrom').value) || 0;
  const yt = parseInt(document.getElementById('yearTo').value) || 9999;
  filtered = DATA.filter(d => {
    if (q && !((d.title||'').toLowerCase().includes(q) || (d.subtitle||'').toLowerCase().includes(q) || (d.detail||'').toLowerCase().includes(q))) return false;
    if (d.year < yf || d.year > yt) return false;
    if (activeType && d.tipo !== activeType) return false;
    return true;
  });
  doSort(); currentPage = 1; render();
}

function doSort() {
  filtered.sort((a,b) => {
    if (sortKey==='year') return sortDir*(b.year-a.year);
    if (sortKey==='author') return sortDir*(a.subtitle||'').localeCompare(b.subtitle||'');
    return sortDir*(a.title||'').localeCompare(b.title||'');
  });
}

function setSort(key) {
  if (sortKey===key) sortDir*=-1; else {sortKey=key; sortDir=-1;}
  ['year','author','title'].forEach(k => document.getElementById('s-'+k).classList.toggle('active', k===key));
  doSort(); render();
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return d + '.' + m + '.' + y;
}

function parseDetail(detail) {
  if (!detail) return {venue: '', city: ''};
  // Secondary bib detail is a full citation — extract venue/journal
  // Look for "in [Publication]" pattern
  const inMatch = detail.match(/,\s+in\s+([^,]+)/i);
  if (inMatch) return {venue: inMatch[1].trim(), city: ''};
  // Fallback: split on · if present
  if (detail.includes(' · ')) {
    const parts = detail.split(' · ');
    return {venue: parts[0] || '', city: parts[1] || ''};
  }
  return {venue: '', city: ''};
}

function render() {
  document.getElementById('sn-total').textContent = DATA.length.toLocaleString('it');
  document.getElementById('sn-shown').textContent = filtered.length.toLocaleString('it');
  document.getElementById('sn-authors').textContent = new Set(filtered.map(d=>d.subtitle).filter(Boolean)).size.toLocaleString('it');

  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  if (!page.length) {
    document.getElementById('entries').innerHTML = '<div class="no-results">Nessun contributo trovato.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  function entryHtml(d) {
    const people = (d.people||[]).filter(p=>p.role==='autore');
    const author = people.length
      ? people.map(p=>'<span class="person-link" data-name="'+p.name.replace(/"/g,'&quot;')+'" onclick="event.stopPropagation();setPersonFilter(this.dataset.name)" style="font-style:italic;color:var(--muted)">'+p.name+'</span>').join('; ')
      : (d.subtitle || '<em style="color:#bbb">Anonimo</em>');
    const badges = connBadges(d.id, 'secondary bibliography');
    const fullDate = formatDate(d.date);
    const typeTag = d.tipo ? '<span class="type-tag">' + d.tipo + '</span>' : '';
    return '<div class="entry" onclick="window.location.href=\'detail.html?id=' + d.id + '\'" style="cursor:pointer">' +
      '<div class="entry-year">' + fullDate + '</div>' +
      '<div>' +
        '<div class="entry-title">' + (d.title||'') + '</div>' +
        '<div class="entry-author">' + author + '</div>' +
        (d.detail ? '<div class="entry-source">' + d.detail + '</div>' : '') +
        badges +
      '</div>' +
      typeTag +
    '</div>';
  }

  const groups = {};
  page.forEach(d => {
    const dec = Math.floor(d.year / 10) * 10;
    if (!groups[dec]) groups[dec] = [];
    groups[dec].push(d);
  });
  const decades = Object.keys(groups).sort((a,b) => sortKey==='year' ? sortDir*(b-a) : a-b);
  document.getElementById('entries').innerHTML = decades.map(dec =>
    '<div class="decade-header">' + dec + 's</div>' +
    groups[dec].map(d => entryHtml(d)).join('')
  ).join('');

  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  let pages = '';
  const around = 7;
  for (let i=1; i<=totalPages; i++) {
    if (i===1 || i===totalPages || Math.abs(i-currentPage)<=around/2) {
      pages += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i-currentPage)===Math.ceil(around/2)+1) {
      pages += `<span style="padding:4px 4px;color:#999;font-size:11px">…</span>`;
    }
  }
  document.getElementById('pagination').innerHTML = pages;
}

function goPage(n) { currentPage=n; render(); window.scrollTo(0,0); }


let CONN_SUMMARY = {};
const BADGE_COLORS = {"library": "#7a3b1e", "secondary bibliography": "#1e4a7a", "primary bibliography": "#1a6a40", "archive": "#6a3a1a", "letter": "#5a1e7a", "translation": "#6a5a1a"};
const BADGE_SHORT = {"library": "Bib.", "secondary bibliography": "Bib. sec.", "primary bibliography": "Bib. prim.", "archive": "Arc.", "letter": "Ep.", "translation": "Trad."};
function connBadges(id, ownCat) {
  const cats = CONN_SUMMARY[id];
  if (!cats || !cats.length) return '';
  const filtered2 = cats.filter(c => c !== ownCat);
  if (!filtered2.length) return '';
  return '<div class="conn-badges">' + filtered2.map(c => {
    const col = BADGE_COLORS[c] || '#888';
    const lbl = BADGE_SHORT[c] || c;
    return `<span class="conn-badge" style="background:${col}18;color:${col};border:1px solid ${col}40" onclick="event.stopPropagation();window.location='detail.html?id=${id}'">${lbl}</span>`;
  }).join('') + '</div>';
}

Promise.all([
  fetch('items.json').then(r => r.json()),
  fetch('conn_summary.json').then(r => r.json())
]).then(([allData, summary]) => {
  ALL_DATA = allData;
  DATA = allData.filter(d => d.category === 'secondary bibliography');
  CONN_SUMMARY = summary;
  buildTypeBtns();
  const urlP = new URLSearchParams(window.location.search);
  if (urlP.get('theme')) setSectionThemeFilter(decodeURIComponent(urlP.get('theme')));
  else if (urlP.get('venue')) setVenueFilter(decodeURIComponent(urlP.get('venue')));
  else if (urlP.get('person')) setPersonFilter(decodeURIComponent(urlP.get('person')));
  else applyFilters();
}).catch(err => {
  console.error('Errore caricamento dati:', err);
  document.getElementById('entries').innerHTML = '<p style="padding:2rem;color:#c00;font-family:monospace">Errore: ' + err + '</p>';
});


function exportData(fmt) {
  if (!filtered || !filtered.length) return;
  let content, mime, ext;
  if (fmt === 'json') {
    content = JSON.stringify(filtered, null, 2);
    mime = 'application/json'; ext = 'json';
  } else {
    const keys = [...new Set(filtered.flatMap(d => Object.keys(d)))].filter(k => !['themes','people','genitore','figlio'].includes(k));
    const esc = v => '"' + String(v==null?'':v).replace(/"/g,'""') + '"';
    const rows = [keys.join(','), ...filtered.map(d => keys.map(k => {
      const v = d[k];
      if (Array.isArray(v)) return esc(v.join('; '));
      return esc(v);
    }).join(','))];
    content = rows.join('\n');
    mime = 'text/csv'; ext = 'csv';
  }
  const blob = new Blob([content], {type: mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'opengadda_export.' + ext;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
